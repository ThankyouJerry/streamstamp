<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            max-height: 600px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            color: white;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            gap: 16px;
            padding: 12px 16px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb;
        }

        .stat-label {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .video-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .video-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.2s;
        }

        .video-item:hover {
            background: #f9fafb;
        }

        .video-content {
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .video-title {
            font-size: 13px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #6b7280;
        }

        .timestamp-count {
            background: #dbeafe;
            color: #2563eb;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .video-delete {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            line-height: 1;
            border-radius: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .video-delete:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .empty-state {
            padding: 40px 16px;
            text-align: center;
            color: #9ca3af;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .empty-hint {
            font-size: 12px;
        }

        .action-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 12px 16px;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        .action-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .video-list::-webkit-scrollbar {
            width: 6px;
        }

        .video-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .video-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .video-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>⏱️ StreamStamp</h1>
        <div class="subtitle">YouTube 타임스탬프 관리</div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="video-count">0</div>
            <div class="stat-label">저장된 영상</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="timestamp-count">0</div>
            <div class="stat-label">총 타임스탬프</div>
        </div>
    </div>

    <button id="record-btn" class="action-btn">📝 현재 영상 기록하기</button>

    <div class="video-list" id="video-list">
        <div class="empty-state">
            <div class="empty-icon">📹</div>
            <div class="empty-text">저장된 타임스탬프가 없습니다</div>
            <div class="empty-hint">YouTube 영상에서 타임스탬프를 추가해보세요!</div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
